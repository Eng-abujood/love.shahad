<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اطلبي و مبرمجك بنفذ🌹🌹</title>
    <meta name="description" content="عنصر div واحد يتحول إلى وردة ثلاثية الأبعاد تنبض بالحياة.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@500;700&family=Fira+Code:wght@500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* التنسيق الإضافي للرسالة لضمان ظهورها بشكل سينمائي ساحر دون التأثير على الوردة */
        .end-text {
            position: fixed;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            text-align: center;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .end-text.show-message {
            opacity: 1;
        }

        .tagline {
            font-family: 'Cairo', sans-serif;
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.8;
            color: #fce4ec;
            text-shadow: 0 2px 10px rgba(244, 143, 177, 0.3), 0 0 20px rgba(0, 0, 0, 0.8);
            background: rgba(15, 17, 19, 0.5);
            padding: 20px 25px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(244, 143, 177, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin: 0;
        }

        .rose-emoji {
            font-size: 2rem;
            animation: pulse 2s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(255,0,0,0.5));
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
    </style>
</head>

<body>
    <div class="vignette"></div>

    <div class="spotlight"></div>
    <div class="ambient-light" id="ambientLight"></div>

    <div class="trigger-overlay" id="triggerOverlay">
        <div class="glass-card">
            <div class="card-glow"></div>
            <div class="rose-icon">🌹</div>
            <h2 class="title">Love You Shahad</h2>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <p class="status-text" id="statusText">جاهز للتحميل والتشغيل...</p>
            <button class="start-button" id="startButton" disabled>
                <span class="btn-text"> حبيبتي اكبسي هون</span>
                <span class="btn-shine"></span>
            </button>
        </div>
    </div>

    <div class="scene">
        <div class="rose-wrapper" id="roseWrapper">
            <div class="stem-group">
                <div class="stem" id="stem">
                    <div class="stem-highlight"></div>
                </div>
                <div class="thorn thorn-1" id="thorn1"></div>
                <div class="thorn thorn-2" id="thorn2"></div>
                <div class="leaf leaf-left" id="leafLeft">
                    <div class="leaf-vein"></div>
                </div>
                <div class="leaf leaf-right" id="leafRight">
                    <div class="leaf-vein"></div>
                </div>
            </div>

            <div class="calyx" id="calyx"></div>

            <div class="rose-head" id="roseHead">
                <div class="rose-glow"></div>
                <div class="rose-glow-inner"></div>
            </div>
        </div>
    </div>

    <div class="end-text" id="endText">
        <p class="tagline" id="tagline"></p>
        <span class="rose-emoji">🌹</span>
    </div>

    <div id="fallingPetals"></div>

    <script src="script.js"></script>
</body>

</html>
